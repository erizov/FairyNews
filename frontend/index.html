<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FairyNews — MVP</title>
  <style>
    :root {
      font-family: Georgia, "Times New Roman", serif;
      --bg: #f6f0e6;
      --card: #fffef9;
      --accent: #6b4226;
      --muted: #5c5348;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: #1a1410;
    }
    main {
      max-width: 40rem;
      margin: 0 auto;
      padding: 1.5rem 1rem 3rem;
    }
    h1 {
      font-size: 1.35rem;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }
    .sub {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    section.page {
      display: none;
      background: var(--card);
      border-radius: 8px;
      padding: 1.25rem;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }
    section.page.active { display: block; }
    label { display: block; margin: 0.75rem 0 0.25rem; font-size: 0.9rem; }
    textarea, select {
      width: 100%;
      box-sizing: border-box;
      font: inherit;
      padding: 0.5rem;
      border: 1px solid #c9b8a4;
      border-radius: 4px;
      background: #fff;
    }
    textarea { min-height: 7rem; resize: vertical; }
    .news-list { list-style: none; padding: 0; margin: 0; }
    .news-list li {
      margin: 0.5rem 0;
      padding: 0.6rem 0.75rem;
      border: 1px solid #d8ccb8;
      border-radius: 6px;
      cursor: pointer;
    }
    .news-list li.selected {
      border-color: var(--accent);
      background: #faf5ed;
    }
    .news-list .title { font-weight: bold; }
    .news-list .meta { font-size: 0.8rem; color: var(--muted); }
    button {
      margin-top: 1rem;
      padding: 0.55rem 1.1rem;
      font: inherit;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button.secondary {
      background: #8a7968;
      margin-right: 0.5rem;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .tale-out {
      white-space: pre-wrap;
      line-height: 1.5;
      margin-top: 0.5rem;
    }
    .err { color: #8b2942; font-size: 0.9rem; margin-top: 0.5rem; }
    .step { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <main>
    <h1>Нейро-сказочник — MVP</h1>
    <p class="sub">Шаг 1–3: новость → пресет RAG → сказка (4 агента: новости,
      генерация, аудит, вопрос–ответ).</p>

    <section id="page1" class="page active" aria-label="Шаг 1">
      <p class="step">ШАГ 1 ИЗ 3 — НОВОСТЬ</p>
      <p>Выберите мок-новость или вставьте свою выжимку.</p>
      <ul id="newsList" class="news-list"></ul>
      <label for="customNews">Свой текст (если заполнен — используется он)</label>
      <textarea id="customNews" placeholder="Заголовок и краткое содержание…"
        maxlength="8000"></textarea>
      <p id="err1" class="err" hidden></p>
      <button type="button" id="toStep2">Далее</button>
    </section>

    <section id="page2" class="page" aria-label="Шаг 2">
      <p class="step">ШАГ 2 ИЗ 3 — СКАЗКА</p>
      <label for="presetSelect">Опора для поиска похожих сюжетов (RAG)</label>
      <select id="presetSelect"></select>
      <p id="presetDesc" class="sub" style="margin-top:0.5rem"></p>
      <p id="err2" class="err" hidden></p>
      <button type="button" id="back2" class="secondary">Назад</button>
      <button type="button" id="runGen">Сгенерировать</button>
    </section>

    <section id="page3" class="page" aria-label="Шаг 3">
      <p class="step">ШАГ 3 ИЗ 3 — РЕЗУЛЬТАТ</p>
      <p id="err3" class="err" hidden></p>
      <div id="metaOut" class="sub" style="margin-bottom:0.75rem"></div>
      <div id="tale" class="tale-out"></div>
      <h2 style="font-size:1rem;margin-top:1.25rem;color:var(--accent);">
        Вопрос по сказке
      </h2>
      <div id="qaQ" class="tale-out"></div>
      <div id="qaA" class="tale-out" style="color:var(--muted)"></div>
      <button type="button" id="back3" class="secondary">Назад к выбору сказки</button>
    </section>
  </main>
  <script>
(function () {
  const state = { newsId: null, presetId: "default" };

  function showPage(n) {
    document.querySelectorAll("section.page").forEach(function (el) {
      el.classList.remove("active");
    });
    document.getElementById("page" + n).classList.add("active");
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    if (msg) { el.textContent = msg; el.hidden = false; }
    else { el.textContent = ""; el.hidden = true; }
  }

  async function loadNews() {
    const r = await fetch("/api/news");
    const data = await r.json();
    const ul = document.getElementById("newsList");
    ul.innerHTML = "";
    data.items.forEach(function (item) {
      const li = document.createElement("li");
      li.dataset.id = item.id;
      li.innerHTML =
        '<div class="title"></div><div class="meta"></div>';
      li.querySelector(".title").textContent = item.title;
      li.querySelector(".meta").textContent = item.date;
      li.addEventListener("click", function () {
        ul.querySelectorAll("li").forEach(function (x) {
          x.classList.remove("selected");
        });
        li.classList.add("selected");
        state.newsId = item.id;
      });
      ul.appendChild(li);
    });
    if (data.items.length) {
      ul.querySelector("li").click();
    }
  }

  async function loadPresets() {
    const r = await fetch("/api/tale-presets");
    const data = await r.json();
    const sel = document.getElementById("presetSelect");
    sel.innerHTML = "";
    data.items.forEach(function (p) {
      const opt = document.createElement("option");
      opt.value = p.id;
      opt.textContent = p.label;
      sel.appendChild(opt);
    });
    sel.value = state.presetId;
    function updDesc() {
      const p = data.items.find(function (x) { return x.id === sel.value; });
      document.getElementById("presetDesc").textContent =
        p ? p.description : "";
    }
    sel.addEventListener("change", updDesc);
    updDesc();
  }

  document.getElementById("toStep2").addEventListener("click", function () {
    showErr("err1", "");
    const custom = document.getElementById("customNews").value.trim();
    if (!custom && !state.newsId) {
      showErr("err1", "Выберите новость или введите текст.");
      return;
    }
    showPage(2);
  });

  document.getElementById("back2").addEventListener("click", function () {
    showPage(1);
  });

  document.getElementById("back3").addEventListener("click", function () {
    showPage(2);
  });

  document.getElementById("runGen").addEventListener("click", async function () {
    showErr("err2", "");
    const btn = document.getElementById("runGen");
    btn.disabled = true;
    const custom = document.getElementById("customNews").value.trim();
    const presetId = document.getElementById("presetSelect").value;
    const body = { preset_id: presetId };
    if (custom) body.news_text = custom;
    else body.news_id = state.newsId;

    try {
      const r = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await r.json().catch(function () { return {}; });
      if (!r.ok) {
        showErr("err2", data.detail || r.statusText || "Ошибка");
        return;
      }
      document.getElementById("tale").textContent = data.tale || "";
      var meta = "";
      if (data.chosen_tale_source) {
        meta += "Опора RAG (источник): " + data.chosen_tale_source;
      }
      if (data.rag_chunks_used) {
        meta += " · чанков: " + data.rag_chunks_used;
      }
      if (data.audit) {
        meta += " · аудит: "
          + (data.audit.approved ? "ок" : "правки")
          + (data.audit.notes ? " — " + data.audit.notes : "");
      }
      document.getElementById("metaOut").textContent = meta;
      document.getElementById("qaQ").textContent =
        (data.qa && data.qa.question) ? data.qa.question : "";
      document.getElementById("qaA").textContent =
        (data.qa && data.qa.reference_answer)
          ? "Эталон: " + data.qa.reference_answer
          : "";
      showErr("err3", "");
      showPage(3);
    } catch (e) {
      showErr("err2", "Сеть или сервер недоступны.");
    } finally {
      btn.disabled = false;
    }
  });

  loadNews();
  loadPresets();
})();
  </script>
</body>
</html>

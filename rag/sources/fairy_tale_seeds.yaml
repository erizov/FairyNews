# Seeds for classical (mostly PD) fairy-tale texts via Project Gutenberg.
# heroes_en / heroes_ru — подсказки для отчёта и RAG (двуязычно).
# content_lang: язык *текста* в чанках (у Gutenberg по умолчанию en; локальные
#   файлы — ru). Для русского полнотекста с Gutenberg задайте content_lang: ru.
# Political news are intentionally OUT OF SCOPE for this RAG.

gutenberg_epubs:
  - id: 2591
    domain: european
    country: DE
    author: "Brothers Grimm"
    heroes_en: "Red Riding Hood; Snow White; wolf; witch; many folk figures"
    heroes_ru: "Красная Шапочка; Белоснежка; волк; ведьма; множество народных образов"
    note: "Grimms' Fairy Tales"

# Local UTF-8 .txt: narrow globs first (metadata wins), then broad **.
# content_lang по умолчанию ru (русский текст файла).
local_globs:
  - pattern: "data/raw/local_tales/soviet/**/*.txt"
    default_domain: russian
    country: USSR
    content_lang: ru
    author: ""
    heroes_en: ""
    heroes_ru: ""
  - pattern: "data/raw/local_tales/russian/**/*.txt"
    default_domain: russian
    country: RU
    content_lang: ru
    author: ""
    heroes_en: ""
    heroes_ru: ""
  - pattern: "data/raw/local_tales/**/*.txt"
    default_domain: russian
    country: RU
    content_lang: ru
    heroes_en: ""
    heroes_ru: ""
